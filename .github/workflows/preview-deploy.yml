name: 👁️ Deploy PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Prepare preview files
        run: |
          mkdir -p _preview
          cp index.html styles.css _preview/
          cp -r media _preview/

      - name: Deploy preview to gh-pages subfolder
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_preview
          destination_dir: preview/pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: "preview: PR #${{ github.event.pull_request.number }} [skip ci]"

      - name: Post or update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const repo = context.repo;
            const url = `https://contrivation-labs.github.io/contrivationlabs.github.io/preview/pr-${pr}/`;
            const marker = '<!-- preview-bot -->';
            const body = `${marker}\n## 👁️ Preview ready\n\n[**→ Click here to preview the site**](${url})\n\n_Updates automatically when new commits are added to this PR._`;

            const { data: comments } = await github.rest.issues.listComments({
              ...repo, issue_number: pr
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                ...repo, issue_number: pr, body
              });
            }
