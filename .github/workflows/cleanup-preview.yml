name: 🧹 Cleanup Preview

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PR=${{ github.event.pull_request.number }}
          DIR="preview/pr-$PR"
          if [ -d "$DIR" ]; then
            rm -rf "$DIR"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "cleanup: remove preview for PR #$PR [skip ci]"
            git push
            echo "Removed $DIR"
          else
            echo "No preview found for PR #$PR — nothing to clean up."
          fi
