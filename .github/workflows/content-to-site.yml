name: 📝 Content Update → Create PR

on:
  push:
    branches: [main]
    paths:
      - content.md

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update index.html from content.md
        run: python .github/scripts/update_from_content.py

      - name: Open or update PR with changes
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: preview/content-update
          base: main
          delete-branch: false
          title: "📝 Website update from content.md"
          labels: automated
          commit-message: "chore: update site from content.md [skip ci]"
          body: |
            ## Website content update

            Changes in `content.md` have been applied to the site by Claude.

            ### How to review
            1. 🔍 Click the **preview link** posted as a comment below
            2. 💬 Leave a comment if anything needs adjusting — Claude will fix it
            3. ✅ Click **Merge pull request** to publish to the live site

            > 🤖 Powered by Claude + GitHub Actions

      - name: Prepare preview files
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          mkdir -p _preview
          cp index.html styles.css _preview/
          cp -r media _preview/

      - name: Deploy preview to gh-pages
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_preview
          destination_dir: preview/pr-${{ steps.cpr.outputs.pull-request-number }}
          keep_files: true
          commit_message: "preview: PR #${{ steps.cpr.outputs.pull-request-number }} [skip ci]"

      - name: Post preview link as PR comment
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = '${{ steps.cpr.outputs.pull-request-number }}';
            const url = `https://contrivation-labs.github.io/contrivationlabs.github.io/preview/pr-${pr}/`;
            const marker = '<!-- preview-bot -->';
            const body = `${marker}\n## 👁️ Preview ready\n\n[**→ Click here to preview the site**](${url})\n\n_Updates automatically when new commits are added to this PR._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(pr)
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(pr),
                body
              });
            }
