name: 🚀 Deploy Production

on:
  push:
    branches: [main]
    paths:
      - index.html
      - styles.css
      - media/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _deploy
          cp index.html styles.css _deploy/
          cp -r media _deploy/

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          keep_files: true
          commit_message: "deploy: production [skip ci]"
